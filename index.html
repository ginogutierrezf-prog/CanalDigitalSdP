<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Dashboard Cobranza Digital · Mayo 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f1f4f8;--surface:#fff;--surface2:#f7f9fc;--surface3:#edf0f5;
  --border:#e2e7ef;--border2:#c9d2e0;
  --bcp:#1a5fd4;--bcp-pale:rgba(26,95,212,.08);--bcp-glow:rgba(26,95,212,.14);
  --yape:#e0500a;--yape-pale:rgba(224,80,10,.08);--yape-glow:rgba(224,80,10,.14);
  --pre:#7c3aed;--pre-pale:rgba(124,58,237,.08);
  --trad:#64748b;--trad-pale:rgba(100,116,139,.1);
  --tot:#0f766e;--tot-pale:rgba(15,118,110,.08);
  --green:#15803d;--green-bg:rgba(21,128,61,.09);
  --red:#b91c1c;--red-bg:rgba(185,28,28,.09);
  --amber:#b45309;--amber-bg:rgba(180,83,9,.08);
  --text:#111827;--text2:#374151;--text3:#6b7280;--text4:#9ca3af;
  --sans:'Plus Jakarta Sans',sans-serif;--mono:'JetBrains Mono',monospace;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 16px rgba(0,0,0,.09);--r:11px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{-webkit-text-size-adjust:100%;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;-webkit-font-smoothing:antialiased;}

/* HEADER */
.hdr{padding:12px 16px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:200;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:space-between;gap:10px;}
.hdr-left{display:flex;align-items:center;gap:11px;min-width:0;}
.hdr-logo{width:32px;height:32px;flex-shrink:0;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;}
.hdr-logo.bcp{background:linear-gradient(135deg,var(--bcp),var(--pre));}
.hdr-logo.yape{background:linear-gradient(135deg,var(--yape),#f97316);}
.hdr-title{font-size:15px;font-weight:700;white-space:nowrap;}
.hdr-badges{display:flex;gap:6px;align-items:center;flex-shrink:0;}
.badge{font-family:var(--mono);font-size:10px;font-weight:500;padding:3px 9px;border-radius:20px;border:1px solid var(--border2);color:var(--text2);background:var(--surface2);}
.badge.green{color:var(--green);border-color:rgba(21,128,61,.28);background:rgba(21,128,61,.07);}

/* ENTITY TABS */
.entity-bar{display:flex;gap:8px;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--surface);}
.ent-tab{padding:7px 18px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface2);cursor:pointer;font-family:var(--sans);font-size:13px;font-weight:700;color:var(--text3);transition:all .16s;}
.ent-tab.bcp.active{color:var(--bcp);border-color:var(--bcp);background:var(--bcp-pale);box-shadow:0 0 0 3px rgba(26,95,212,.08);}
.ent-tab.yape.active{color:var(--yape);border-color:var(--yape);background:var(--yape-pale);box-shadow:0 0 0 3px rgba(224,80,10,.08);}
.ent-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:5px;background:currentColor;}

/* HAMBURGER */
.hamburger{display:none;flex-direction:column;gap:4px;padding:6px;background:none;border:none;cursor:pointer;border-radius:6px;}
.hamburger span{display:block;width:20px;height:2px;background:var(--text2);border-radius:2px;transition:all .2s;}
.hamburger.open span:nth-child(1){transform:translateY(6px) rotate(45deg);}
.hamburger.open span:nth-child(2){opacity:0;}
.hamburger.open span:nth-child(3){transform:translateY(-6px) rotate(-45deg);}
.drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:150;opacity:0;transition:opacity .25s;}
.drawer-overlay.open{display:block;opacity:1;}

/* LAYOUT */
.main{display:flex;height:calc(100vh - 105px);overflow:hidden;}

/* NAV */
.left-panel{width:260px;min-width:260px;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;padding:14px 0;flex-shrink:0;transition:transform .25s ease;}
.left-panel::-webkit-scrollbar{width:3px;}
.left-panel::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.nav-label{font-family:var(--mono);font-size:9.5px;font-weight:600;letter-spacing:2px;color:var(--text4);text-transform:uppercase;padding:0 15px 8px;}
.tramo-tree{padding:0 5px;}
.tramo-item{margin-bottom:2px;}
.tramo-btn{width:100%;display:flex;align-items:center;gap:9px;padding:8px 9px;border-radius:8px;background:transparent;border:none;cursor:pointer;font-family:var(--sans);font-size:13px;font-weight:600;color:var(--text2);text-align:left;transition:all .13s;}
.tramo-btn:hover{background:var(--surface2);}
.tramo-btn.active-bcp{background:var(--bcp-pale);color:var(--bcp);}
.tramo-btn.active-yape{background:var(--yape-pale);color:var(--yape);}
.tramo-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-family:var(--mono);font-weight:600;flex-shrink:0;background:var(--surface3);color:var(--text3);}
.tramo-btn.active-bcp .tramo-icon{background:var(--bcp-glow);color:var(--bcp);}
.tramo-btn.active-yape .tramo-icon{background:var(--yape-glow);color:var(--yape);}
.tramo-label{flex:1;line-height:1.2;}
.tramo-desc{font-size:10px;color:var(--text4);font-weight:400;font-family:var(--mono);display:block;margin-top:1px;}
.chevron{font-size:9px;color:var(--text4);transition:transform .18s;}
.tramo-btn.expanded .chevron{transform:rotate(90deg);}
.sub-items{display:none;margin-left:13px;padding-left:10px;border-left:2px solid var(--border);margin-top:1px;}
.sub-items.open{display:block;}
.sub-btn{width:100%;display:flex;align-items:center;gap:8px;padding:6px 9px;border-radius:6px;background:transparent;border:none;cursor:pointer;font-family:var(--mono);font-size:11px;color:var(--text3);text-align:left;transition:all .11s;margin-bottom:1px;}
.sub-btn:hover{background:var(--surface2);color:var(--text2);}
.sub-btn.active-bcp{background:var(--bcp-pale);color:var(--bcp);font-weight:600;}
.sub-btn.active-yape{background:var(--yape-pale);color:var(--yape);font-weight:600;}
.sub-dot{width:4px;height:4px;border-radius:50%;background:currentColor;flex-shrink:0;}
.subsub-items{display:none;margin-left:10px;padding-left:8px;border-left:1px dashed var(--border2);margin-top:1px;}
.subsub-items.open{display:block;}
.ss-btn{width:100%;display:flex;align-items:center;gap:7px;padding:4px 8px;border-radius:5px;background:transparent;border:none;cursor:pointer;font-family:var(--mono);font-size:10px;color:var(--text4);text-align:left;transition:all .1s;margin-bottom:1px;}
.ss-btn:hover{background:var(--surface2);color:var(--text2);}
.ss-btn.active-bcp{background:var(--bcp-pale);color:var(--bcp);}
.ss-btn.active-yape{background:var(--yape-pale);color:var(--yape);}
.sss-items{display:none;margin-left:10px;padding-left:8px;border-left:1px dotted var(--border2);margin-top:1px;}
.sss-items.open{display:block;}
.sss-btn{width:100%;display:flex;align-items:center;gap:6px;padding:3px 7px;border-radius:4px;background:transparent;border:none;cursor:pointer;font-family:var(--mono);font-size:9.5px;color:var(--text4);text-align:left;transition:all .1s;margin-bottom:1px;}
.sss-btn:hover{background:var(--surface2);color:var(--text2);}
.sss-btn.active-bcp{background:var(--bcp-pale);color:var(--bcp);}
.sss-btn.active-yape{background:var(--yape-pale);color:var(--yape);}
.divider{height:1px;background:var(--border);margin:8px 11px;}
.group-badge{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text4);padding:2px 13px 6px;}

/* RIGHT PANEL */
.right-panel{flex:1;overflow-y:auto;padding:20px;background:var(--bg);min-width:0;}
.right-panel::-webkit-scrollbar{width:3px;}
.right-panel::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* BREADCRUMB */
.bc{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;font-weight:500;color:var(--text4);margin-bottom:14px;flex-wrap:wrap;}
.bc-sep{color:var(--border2);}
.bc-cur{color:var(--text2);font-weight:600;}

/* SECTION HEADER */
.sec-hdr{display:flex;align-items:flex-end;gap:12px;margin-bottom:14px;}
.sec-title{font-size:24px;font-weight:800;letter-spacing:-1px;line-height:1;}
.sec-title.bcp{color:var(--bcp);}
.sec-title.yape{color:var(--yape);}
.sec-sub{font-family:var(--mono);font-size:11px;color:var(--text3);padding-bottom:3px;}

/* BANNERS */
.wl-banner{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:9px;margin-bottom:14px;font-size:12px;font-weight:600;border:1.5px solid;}
.wl-banner.win{background:var(--green-bg);border-color:rgba(21,128,61,.28);color:var(--green);}
.wl-banner.loss{background:var(--red-bg);border-color:rgba(185,28,28,.28);color:var(--red);}
.wl-banner.tie{background:var(--amber-bg);border-color:rgba(180,83,9,.28);color:var(--amber);}
.wl-banner.nodig{background:var(--amber-bg);border-color:rgba(180,83,9,.28);color:var(--amber);}
.wl-icon{font-size:15px;flex-shrink:0;}
.wl-text{flex:1;line-height:1.3;}
.wl-diff{font-family:var(--mono);font-size:12px;font-weight:700;padding:2px 9px;border-radius:6px;background:rgba(255,255,255,.65);white-space:nowrap;}
.no-pre{display:flex;align-items:center;gap:9px;padding:9px 14px;border-radius:8px;background:var(--amber-bg);border:1px solid rgba(180,83,9,.22);color:var(--amber);font-family:var(--mono);font-size:11px;margin-bottom:14px;}

/* KPI DONUT GRID */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px;}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 12px 12px;box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;}
.kpi-card-title{font-family:var(--mono);font-size:9.5px;font-weight:600;letter-spacing:.9px;text-transform:uppercase;color:var(--text3);margin-bottom:10px;text-align:center;}
.donut-wrap{position:relative;width:110px;height:110px;margin:0 auto;}
.donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;}
.donut-val{font-size:14px;font-weight:800;color:var(--text);letter-spacing:-.5px;line-height:1;}
.donut-sub{font-family:var(--mono);font-size:9px;color:var(--text3);margin-top:2px;}
.kpi-leg{display:flex;flex-direction:column;gap:4px;margin-top:10px;width:100%;}
.leg-row{display:flex;align-items:center;justify-content:space-between;gap:4px;}
.leg-left{display:flex;align-items:center;gap:5px;min-width:0;}
.leg-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.leg-lbl{font-family:var(--mono);font-size:9.5px;color:var(--text3);}
.leg-val{font-family:var(--mono);font-size:9.5px;font-weight:600;color:var(--text2);}
.leg-pct{font-family:var(--mono);font-size:9px;color:var(--text4);}

/* PILLS */
.pill{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10.5px;font-weight:600;font-family:var(--mono);white-space:nowrap;}
.pill.bcp{background:var(--bcp-pale);color:var(--bcp);}
.pill.yape{background:var(--yape-pale);color:var(--yape);}
.pill.pre{background:var(--pre-pale);color:var(--pre);}
.pill.trad{background:var(--trad-pale);color:var(--trad);}
.pill.na{background:var(--surface3);color:var(--text3);}
.pill.win{background:var(--green-bg);color:var(--green);}
.pill.loss{background:var(--red-bg);color:var(--red);}
.pill.tie{background:var(--amber-bg);color:var(--amber);}

/* CHARTS */
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 14px 12px;box-shadow:var(--shadow);min-width:0;}
.chart-title{font-size:12px;font-weight:700;color:var(--text);margin-bottom:3px;}
.chart-sub{font-family:var(--mono);font-size:9.5px;color:var(--text3);margin-bottom:12px;}
canvas{display:block;width:100%!important;}

/* TABLE */
.tbl-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);margin-bottom:16px;}
.tbl-hdr{padding:11px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--surface2);}
.tbl-title{font-size:13px;font-weight:700;color:var(--text);flex:1;}
.tbl-badge{font-family:var(--mono);font-size:9.5px;padding:2px 7px;border-radius:4px;border:1px solid var(--border2);color:var(--text3);}
.tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;min-width:640px;}
thead tr{background:var(--surface2);}
th{font-family:var(--mono);font-size:9.5px;font-weight:600;letter-spacing:.7px;text-transform:uppercase;color:var(--text3);padding:8px 11px;text-align:right;white-space:nowrap;border-bottom:1px solid var(--border);}
th:first-child{text-align:left;}
th.th-dig{color:var(--bcp);}th.th-pre{color:var(--pre);}th.th-trad{color:var(--trad);}
tbody tr{border-top:1px solid var(--border);transition:background .09s;}
tbody tr.cl{cursor:pointer;}tbody tr.cl:hover{background:var(--surface2);}
tbody tr.rs td:first-child{padding-left:24px;font-size:12px;font-family:var(--mono);font-weight:500;color:var(--text2);}
tbody tr.rss td:first-child{padding-left:38px;font-size:11px;font-family:var(--mono);font-weight:400;color:var(--text3);}
td{padding:9px 11px;font-family:var(--mono);font-size:11.5px;font-weight:500;color:var(--text2);text-align:right;white-space:nowrap;}
td:first-child{text-align:left;color:var(--text);font-weight:700;font-family:var(--sans);font-size:13px;}
.gap-cell{text-align:center!important;}
.na-c{color:var(--text4)!important;}

/* NO DATA */
.no-data{padding:36px 20px;text-align:center;font-family:var(--mono);font-size:12px;color:var(--text3);}
.no-data span{display:block;font-size:22px;margin-bottom:8px;}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.an{animation:fadeUp .24s ease both;}
.an1{animation-delay:.04s;}.an2{animation-delay:.08s;}.an3{animation-delay:.13s;}.an4{animation-delay:.18s;}

/* RESPONSIVE */
@media(max-width:900px){
  .hamburger{display:flex;}
  .left-panel{position:fixed;left:0;top:0;bottom:0;z-index:160;transform:translateX(-100%);box-shadow:var(--shadow-md);padding-top:60px;}
  .left-panel.open{transform:translateX(0);}
  .main{height:calc(100vh - 105px);}
  .kpi-grid{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:768px){.charts-row{grid-template-columns:1fr;}}
@media(max-width:480px){.hdr-title{font-size:14px;}.right-panel{padding:14px 12px;}.kpi-grid{grid-template-columns:repeat(2,1fr);gap:8px;}.sec-title{font-size:20px;}.charts-row{grid-template-columns:1fr;}}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <div class="hdr-left">
    <button class="hamburger" id="hamburger" onclick="toggleDrawer()"><span></span><span></span><span></span></button>
    <div class="hdr-logo bcp" id="hdrLogo">CD</div>
    <div><div class="hdr-title" id="hdrTitle">Cobranza Digital · BCP</div></div>
  </div>
  <div class="hdr-badges">
    <div class="badge">MAYO 2026</div>
    <div class="badge green">● Corte 14/05</div>
  </div>
</header>

<!-- ENTITY TABS -->
<div class="entity-bar">
  <button class="ent-tab bcp active" id="tab-bcp" onclick="setEntity('bcp')"><span class="ent-dot"></span>BCP</button>
  <button class="ent-tab yape" id="tab-yape" onclick="setEntity('yape')"><span class="ent-dot"></span>Yape</button>
</div>

<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>

<div class="main">
  <!-- NAV -->
  <nav class="left-panel" id="leftPanel">
    <div class="tramo-tree">
      <div class="nav-label">Navegación</div>

      <!-- TOTAL -->
      <div class="tramo-item">
        <button class="tramo-btn" id="nav-total" onclick="navAndClose('total')">
          <div class="tramo-icon">∑</div>
          <div class="tramo-label">Total 1–120<span class="tramo-desc">Vista consolidada</span></div>
        </button>
      </div>
      <div class="divider"></div>
      <div class="group-badge">Tramos de Mora</div>

      <!-- 1-30 -->
      <div class="tramo-item">
        <button class="tramo-btn" id="nav-t130" onclick="toggleT('t130')">
          <div class="tramo-icon">30</div>
          <div class="tramo-label">Tramo 1–30<span class="tramo-desc" id="desc-t130">Personas · Pyme · Segmentos</span></div>
          <span class="chevron">▶</span>
        </button>
        <div class="sub-items" id="sub-t130">
          <button class="sub-btn" id="nav-t130-res" onclick="navAndClose('t130-res')"><span class="sub-dot"></span>Resumen tramo</button>
          <!-- Personas 1-30 -->
          <button class="sub-btn" id="nav-p130" onclick="toggleSub('p130')"><span class="sub-dot"></span>Personas ▸</button>
          <div class="subsub-items" id="sub-p130">
            <button class="ss-btn" id="nav-p130-res" onclick="navAndClose('p130-res')">• Total Personas</button>
            <button class="ss-btn" id="nav-segA130" onclick="toggleSS('segA130')">• Seg A ▸</button>
            <div class="sss-items" id="sub-segA130">
              <button class="sss-btn" id="nav-segA130-res" onclick="navAndClose('segA130-res')">◦ Total Seg A</button>
              <button class="sss-btn" id="nav-segA130-0-1k" onclick="navAndClose('segA130-0-1k')">◦ 0–1K</button>
              <button class="sss-btn" id="nav-segA130-1k-5k" onclick="navAndClose('segA130-1k-5k')">◦ 1K–5K</button>
              <button class="sss-btn" id="nav-segA130-5k-20k" onclick="navAndClose('segA130-5k-20k')">◦ 5K–20K</button>
              <button class="sss-btn" id="nav-segA130-20k-300k" onclick="navAndClose('segA130-20k-300k')">◦ 20K–300K</button>
              <button class="sss-btn" id="nav-segA130-300k" onclick="navAndClose('segA130-300k')">◦ 300K+</button>
            </div>
            <button class="ss-btn" id="nav-segB130" onclick="toggleSS('segB130')">• Seg B ▸</button>
            <div class="sss-items" id="sub-segB130">
              <button class="sss-btn" id="nav-segB130-res" onclick="navAndClose('segB130-res')">◦ Total Seg B</button>
              <button class="sss-btn" id="nav-segB130-0-1k" onclick="navAndClose('segB130-0-1k')">◦ 0–1K</button>
              <button class="sss-btn" id="nav-segB130-1k-5k" onclick="navAndClose('segB130-1k-5k')">◦ 1K–5K</button>
              <button class="sss-btn" id="nav-segB130-5k-20k" onclick="navAndClose('segB130-5k-20k')">◦ 5K–20K</button>
              <button class="sss-btn" id="nav-segB130-20k-300k" onclick="navAndClose('segB130-20k-300k')">◦ 20K–300K</button>
              <button class="sss-btn" id="nav-segB130-300k" onclick="navAndClose('segB130-300k')">◦ 300K+</button>
            </div>
            <button class="ss-btn" id="nav-segC130" onclick="toggleSS('segC130')">• Seg C ▸</button>
            <div class="sss-items" id="sub-segC130">
              <button class="sss-btn" id="nav-segC130-res" onclick="navAndClose('segC130-res')">◦ Total Seg C</button>
              <button class="sss-btn" id="nav-segC130-0-1k" onclick="navAndClose('segC130-0-1k')">◦ 0–1K</button>
              <button class="sss-btn" id="nav-segC130-1k-5k" onclick="navAndClose('segC130-1k-5k')">◦ 1K–5K</button>
              <button class="sss-btn" id="nav-segC130-5k-20k" onclick="navAndClose('segC130-5k-20k')">◦ 5K–20K</button>
            </div>
            <button class="ss-btn" id="nav-segD130" onclick="toggleSS('segD130')">• Seg D ▸</button>
            <div class="sss-items" id="sub-segD130">

function toggleSS(id){const s=document.getElementById('sub-'+id);if(s)s.classList.toggle('open');}

const isZ=v=>v==null||v===0;

// ── WIN/LOSS ──
function wlCalc(dig,trad){if(dig==null||trad==null||isZ(dig)||isZ(trad))return null;return+((dig-trad)*100).toFixed(2);}
function wlPill(dig,trad,noDig){
  if(noDig)return'<span class="pill na">Sin participación Dig.</span>';
  const v=wlCalc(dig,trad);
  if(v==null)return'<span class="pill na">N/D</span>';
  const s=v>0?'+':'';
  if(v>0.05)return`<span class="pill win">▲ ${s}${v.toFixed(1)} pp</span>`;
  if(v<-0.05)return`<span class="pill loss">▼ ${v.toFixed(1)} pp</span>`;
  return'<span class="pill tie">= 0 pp</span>';
}
function wlBanner(dig,trad,label,noDig){
  if(noDig)return`<div class="wl-banner nodig an an1"><span class="wl-icon">🚫</span><span class="wl-text">Digital <strong>no participa</strong> en <strong>${label||'este segmento'}</strong> · Solo Tradicional</span></div>`;
  const v=wlCalc(dig,trad);
  if(v==null)return'';
  const s=v>0?'+':'',w=label?`<strong>${label}</strong> ·`:'·';
  if(v>0.05)return`<div class="wl-banner win an an1"><span class="wl-icon">✅</span><span class="wl-text">Digital gana ${w} efectividad vs Tradicional</span><span class="wl-diff">${s}${v.toFixed(1)} pp</span></div>`;
  if(v<-0.05)return`<div class="wl-banner loss an an1"><span class="wl-icon">⚠️</span><span class="wl-text">Digital pierde ${w} efectividad vs Tradicional</span><span class="wl-diff">${v.toFixed(1)} pp</span></div>`;
  return`<div class="wl-banner tie an an1"><span class="wl-icon">➖</span><span class="wl-text">Digital empata ${w} vs Tradicional</span><span class="wl-diff">0 pp</span></div>`;
}

function kpiSection(d,hasPre,isYape){
  const col={pre:'#7c3aed',dig:entColor(),trad:'#94a3b8'};
  // For Yape: only digital exists
  const metrics=[
    {id:'dc',title:'Clientes',    k:'cd',kt:'ct',kp:null, fmt:v=>Math.round(v).toLocaleString('es-PE'), tot:d.cd+(d.ct||0)},
    {id:'dd',title:'Deuda Vencida',k:'dvd',kt:'dvt',kp:'dvp',fmt:v=>'S/'+v.toFixed(1),tot:(d.dvd||0)+(d.dvt||0)+(hasPre?d.dvp||0:0)},
    {id:'dr',title:'Recupero',    k:'rd',kt:'rt',kp:'rp', fmt:v=>'S/'+v.toFixed(1),tot:(d.rd||0)+(d.rt||0)+(hasPre?d.rp||0:0)},
  ];

  const donutCards=metrics.map(m=>{
    const vals=[];
    if(hasPre&&m.kp&&!isZ(d[m.kp]))vals.push({l:'Pre',col:col.pre,v:d[m.kp]});
    if(!isZ(d[m.k]))vals.push({l:'Dig',col:col.dig,v:d[m.k]});
    if(!isYape&&!isZ(d[m.kt]))vals.push({l:'Trad',col:col.trad,v:d[m.kt]});
    const tot=vals.reduce((s,x)=>s+x.v,0);
    const legs=vals.map(x=>`<div class="leg-row"><div class="leg-left"><span class="leg-dot" style="background:${x.col}"></span><span class="leg-lbl">${x.l}</span></div><span class="leg-val">${m.fmt(x.v)}</span><span class="leg-pct">${tot>0?(x.v/tot*100).toFixed(0)+'%':''}</span></div>`).join('');
    return`<div class="kpi-card an an2"><div class="kpi-card-title">${m.title}</div><div class="donut-wrap"><canvas id="${m.id}" width="110" height="110"></canvas><div class="donut-center"><div class="donut-val">${m.fmt(m.tot)}</div><div class="donut-sub">Total</div></div></div><div class="kpi-leg">${legs}</div></div>`;
  }).join('');

  // Efectividad bar card
  const efSrc=[];
  if(hasPre&&!isZ(d.ep))efSrc.push({l:'Pre-gestión',col:col.pre,v:d.ep});
  if(!isZ(d.ed))efSrc.push({l:'Digital',col:col.dig,v:d.ed});
  if(!isZ(d.et))efSrc.push({l:isYape?'Ref. Trad':'Tradicional',col:col.trad,v:d.et});
  const efLegs=efSrc.map(x=>`<div class="leg-row"><div class="leg-left"><span class="leg-dot" style="background:${x.col}"></span><span class="leg-lbl">${x.l}</span></div><span class="leg-val">${fmt.pct(x.v)}</span></div>`).join('');
  const efCard=`<div class="kpi-card an an2"><div class="kpi-card-title">Efectividad</div><canvas id="def" height="110" style="max-height:110px;"></canvas><div class="kpi-leg" style="margin-top:8px;">${efLegs}<div style="margin-top:5px;padding-top:5px;border-top:1px solid var(--border);">${wlPill(d.ed,d.et,false)}</div></div></div>`;

  return`<div class="kpi-grid an an2">${donutCards}${efCard}</div>`;
}

function renderDonuts(d,hasPre,isYape){
  const col={pre:'#7c3aed',dig:entColor(),trad:'#94a3b8'};
  [['dc','cd','ct','dvp'],['dd','dvd','dvt','dvp'],['dr','rd','rt','rp']].forEach(([id,kd,kt,kp])=>{
    const vals=[];
    if(hasPre&&kp&&!isZ(d[kp]))vals.push({v:d[kp],c:col.pre});
    if(!isZ(d[kd]))vals.push({v:d[kd],c:col.dig});
    if(!isYape&&!isZ(d[kt]))vals.push({v:d[kt],c:col.trad});
    if(!vals.length)return;
    const ctx=document.getElementById(id)?.getContext('2d');if(!ctx)return;
    const c=new Chart(ctx,{type:'doughnut',data:{datasets:[{data:vals.map(x=>x.v),backgroundColor:vals.map(x=>x.c),borderWidth:2,borderColor:'#fff',hoverOffset:4}]},options:{cutout:'68%',responsive:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'#fff',titleColor:'#111',bodyColor:'#374',borderColor:'#e2e7ef',borderWidth:1,padding:8,bodyFont:{family:'JetBrains Mono',size:10}}}}});
    chartInstances.push(c);
  });
  // Ef bar
  const efSrc=[];
  if(hasPre&&!isZ(d.ep))efSrc.push({l:'Pre',col:col.pre,v:d.ep});
  if(!isZ(d.ed))efSrc.push({l:'Digital',col:col.dig,v:d.ed});
  if(!isZ(d.et))efSrc.push({l:isYape?'Ref. Trad':'Tradicional',col:col.trad,v:d.et});
  if(!efSrc.length)return;
  const ctx2=document.getElementById('def')?.getContext('2d');if(!ctx2)return;
  const c2=new Chart(ctx2,{type:'bar',data:{labels:efSrc.map(x=>x.l),datasets:[{data:efSrc.map(x=>+(x.v*100).toFixed(1)),backgroundColor:efSrc.map(x=>x.col),borderRadius:5,borderSkipped:false}]},options:{indexAxis:'y',responsive:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'#fff',bodyColor:'#374',borderColor:'#e2e7ef',borderWidth:1,padding:8,bodyFont:{family:'JetBrains Mono',size:11},callbacks:{label:c=>` ${c.parsed.x.toFixed(1)}%`}}},scales:{x:{grid:{color:'#f0f2f5'},ticks:{font:{family:'JetBrains Mono',size:9},color:'#6b7280',callback:v=>v+'%'},border:{dash:[4,4]},max:100},y:{grid:{display:false},ticks:{font:{family:CF,size:9.5,weight:'600'},color:'#374151'}}}}});
  chartInstances.push(c2);
}

function lineEfChart(id){

  const getEf=(k,canal)=>{const r=src[k];if(!r)return null;const v=r[canal];return v!=null&&!isZ(v)?+(v*100).toFixed(2):null;};

  if(!isYape)datasets.push({label:'Tradicional',data:keys.map(k=>getEf(k,'et')),borderColor:'#94a3b8',backgroundColor:'transparent',borderWidth:2,pointBackgroundColor:'#94a3b8',pointRadius:4,pointHoverRadius:7,fill:false,tension:0.35,borderDash:[6,3]});
  else datasets.push({label:'Ref. Tradicional',data:keys.map(k=>getEf(k,'et')),borderColor:'#94a3b8',backgroundColor:'transparent',borderWidth:2,pointBackgroundColor:'#94a3b8',pointRadius:4,pointHoverRadius:7,fill:false,tension:0.35,borderDash:[6,3]});
  const ctx=document.getElementById(id)?.getContext('2d');if(!ctx)return;

const TK={'0-1k':'0–1K','1k-5k':'1K–5K','5k-20k':'5K–20K','20k-300k':'20K–300K','300k':'300K+','1k':'1K+'};
function tl(k){return TK[k]||k;}

function tHead(hasPre,isYape){
  const pr=hasPre?`<th class="th-pre">Cli Pre</th><th class="th-pre">Ef. Pre</th>`:`<th colspan="2" style="color:var(--text4);font-size:9px;text-align:center;">Sin Pre</th>`;
  const tr=isYape?'':`<th class="th-trad">Cli Trad</th><th class="th-trad">Ef. Trad</th><th class="gap-cell">Dig vs Trad</th>`;
  return`<thead><tr><th>Nivel</th>${pr}<th class="th-dig">Cli Dig</th><th class="th-dig">Ef. Dig</th>${tr}<th>DV Dig</th><th>Rec Dig</th></tr></thead>`;
}

function tRow(label,d,hasPre,isYape,nav,rc='',noDig){
  const nd=noDig||false;
  const cls=[nav?'cl':'',rc].filter(Boolean).join(' ');
  const click=nav?`onclick="navigate('${nav}')"`:'';
  const pp=hasPre&&d.ep!=null&&!isZ(d.ep)?`<span class="pill pre">${fmt.pct(d.ep)}</span>`:'<span class="na-c">—</span>';
  const pd=nd||isZ(d.ed)?'<span class="na-c">0</span>':`<span class="pill ${entity}">${fmt.pct(d.ed)}</span>`;
  const cliPre=hasPre?`<td>${!isZ(d.ep)?fmt.num(d.cd):'<span class="na-c">—</span>'}</td><td>${pp}</td>`:`<td class="na-c">—</td><td class="na-c">—</td>`;
  const cliDig=nd?'<span class="na-c">0</span>':fmt.num(d.cd);
  const tradCols=isYape?'':` <td>${fmt.num(d.ct)}</td><td>${!isZ(d.et)?`<span class="pill trad">${fmt.pct(d.et)}</span>`:'<span class="na-c">—</span>'}</td><td class="gap-cell">${wlPill(nd?null:d.ed,d.et,nd)}</td>`;
  const dvDig=nd||isZ(d.dvd)?'<span class="na-c">0</span>':fmt.mm(d.dvd);
  const recDig=nd||isZ(d.rd)?'<span class="na-c">0</span>':fmt.mm(d.rd);
  return`<tr class="${cls}" ${click}><td>${label}</td>${cliPre}<td>${cliDig}</td><td>${pd}</td>${tradCols}<td>${dvDig}</td><td>${recDig}</td></tr>`;
}

// ═══════════════════════════════════════════════════════════════
//  BREADCRUMB
// ═══════════════════════════════════════════════════════════════
const BC_MAP={
  'total':['Total 1–120'],'t130-res':['Tramo 1–30','Resumen'],'t3160-res':['Tramo 31–60','Resumen'],
  't6190-res':['Tramo 61–90','Resumen'],'t91120-res':['Tramo 91–120','Resumen'],
  't121-res':['Tramo +120','Resumen'],'t121-0-1k':['Tramo +120','0–1K'],'t121-1k':['Tramo +120','1K+'],
  'p130-res':['Tramo 1–30','Personas','Resumen'],'py130-res':['Tramo 1–30','Pyme','Resumen'],
  'p3160-res':['Tramo 31–60','Personas','Resumen'],'py3160-res':['Tramo 31–60','Pyme (solo Trad.)'],
  'pyD130-res':['Tramo 1–30','Pyme','Seg D'],
};
function buildBC(v){
  if(BC_MAP[v])return BC_MAP[v];
  // segment res: segA130-res → Tramo 1-30 / Personas / Seg A
  let m=v.match(/^(seg|py)([ABCD])130-res$/);
  if(m)return['Tramo 1–30',m[1]==='py'?'Pyme':'Personas',`Seg ${m[2]}`,'Resumen'];
  m=v.match(/^(seg|py)([ABCD])130-(.+)$/);
  if(m)return['Tramo 1–30',m[1]==='py'?'Pyme':'Personas',`Seg ${m[2]}`,TK[m[3]]||m[3]];
  m=v.match(/^p3160-(.+)$/);
  if(m)return['Tramo 31–60','Personas',TK[m[1]]||m[1]];
  return[v];
}
function bcHtml(v){
  const parts=buildBC(v);
  return`<div class="bc an">${parts.map((p,i)=>(i?'<span class="bc-sep">›</span>':'')+`<span class="${i===parts.length-1?'bc-cur':''}">${p}</span>`).join('')}</div>`;
}

// ═══════════════════════════════════════════════════════════════
//  RENDER ROUTER
// ═══════════════════════════════════════════════════════════════
function renderView(v){
  const p=document.getElementById('rightPanel');
  const isYape=entity==='yape';

  if(v==='total'){renderTotal(p);return;}

  // Tramo summaries
  if(v==='t130-res'){renderTramoRes(p,'t130','Tramo 1–30',true);return;}
  if(v==='t3160-res'){renderTramoRes(p,'t3160','Tramo 31–60',false);return;}
  if(v==='t6190-res'){renderSimple(p,'t6190','Tramo 61–90','Sin zoom por sub-segmento',false);return;}
  if(v==='t91120-res'){renderSimple(p,'t91120','Tramo 91–120','Sin zoom por sub-segmento',false);return;}
  if(v==='t121-res'&&!isYape){renderSimple(p,'t121','Tramo +120','BCP · Por ticket de deuda',false,true);return;}
  if(v==='t121-0-1k'&&!isYape){renderTicketSimple(p,'t121-0-1k','0–1K','Tramo +120');return;}
  if(v==='t121-1k'&&!isYape){renderTicketSimple(p,'t121-1k','1K+','Tramo +120');return;}

  // 1-30 Personas
  if(v==='p130-res'){renderPortRes(p,'p130','Personas','Tramo 1–30',true);return;}
  if(v==='py130-res'){renderPortRes(p,'py130','Pyme','Tramo 1–30',true);return;}
  if(v==='pyD130-res'){renderSimple(p,'pyD130','Pyme · Seg D','Tramo 1–30',true);return;}

  // Segments 1-30 Personas
  const mSeg=v.match(/^(seg[ABCD])130(-res|-\S+)$/);
  if(mSeg){
    const segKey=mSeg[1]+'130';
    const suffix=mSeg[2];
    if(suffix==='-res'){renderSegRes(p,segKey,`Seg ${mSeg[1][3]}`,'Personas 1–30',true);return;}
    else{renderTicketBCP(p,segKey,suffix.slice(1),`Seg ${mSeg[1][3]}`,'Personas 1–30');return;}
  }

  // Segments 1-30 Pyme
  const mPy=v.match(/^(py[ABC])130(-res|-\S+)$/);
  if(mPy){
    const segKey=mPy[1]+'130';
    const suffix=mPy[2];
    if(suffix==='-res'){renderSegRes(p,segKey,`Seg ${mPy[1][2]}`,'Pyme 1–30',true,true);return;}
    else{renderTicketBCP(p,segKey,suffix.slice(1),`Seg ${mPy[1][2]}`,'Pyme 1–30');return;}
  }

  // 31-60 Personas tickets
  if(v==='p3160-res'){renderPortRes(p,'p3160','Personas','Tramo 31–60',false);return;}
  if(v==='py3160-res'){renderSimple(p,'py3160','Pyme · Solo Tradicional','Tramo 31–60',false,false,true);return;}
  const mP3=v.match(/^p3160-(.+)$/);
  if(mP3){renderTicketBCP(p,'p3160',mP3[1],'Personas','Tramo 31–60',false);return;}

  p.innerHTML=bcHtml(v)+'<div class="no-data"><span>🔍</span>Vista no encontrada</div>';
}

// ─────────────────────────────────────────
//  TOTAL
// ─────────────────────────────────────────
function renderTotal(p){
  const isYape=entity==='yape';
  const src=isYape?YAPE:BCP;
  const d=src['1-120']||src;
  const hasPre=!isYape;
  const tramos=isYape
    ?[{l:'1–30',k:'t130',n:'t130-res'},{l:'31–60',k:'t3160',n:'t3160-res'},{l:'61–90',k:'t6190',n:'t6190-res'},{l:'91–120',k:'t91120',n:'t91120-res'}]
    :[{l:'1–30',k:'t130',n:'t130-res'},{l:'31–60',k:'t3160',n:'t3160-res'},{l:'61–90',k:'t6190',n:'t6190-res'},{l:'91–120',k:'t91120',n:'t91120-res'},{l:'+120',k:'t121',n:'t121-res'}];
  const rows=tramos.map(t=>tRow(t.l,src[t.k]||{},hasPre,isYape,t.n)).join('');

  p.innerHTML=`${bcHtml('total')}
    <div class="sec-hdr an"><div class="sec-title ${entity}">Total 1–120 días</div><div class="sec-sub">${entity.toUpperCase()} · Corte 14/05/2026${isYape?' · 100% Canal Digital':' · Pre-gestión · Digital · Tradicional'}</div></div>
    ${wlBanner(d.ed,d.et,'Total 1–120')}
    ${kpiSection(d,hasPre,isYape)}
    ${chartsBlock('bTot','Clientes por Tramo · Canales',`${entity.toUpperCase()} · Por tramo de mora`,'lTot')}
    <div class="tbl-section an an4"><div class="tbl-hdr"><div class="tbl-title">Resumen por Tramo</div><div class="tbl-badge">Toca fila → zoom</div></div>
    <div class="tbl-scroll"><table>${tHead(hasPre,isYape)}<tbody>${rows}</tbody></table></div></div>`;

  requestAnimationFrame(()=>{
    renderDonuts(d,hasPre,isYape);
    const col=entColor();
    // Exclude +120 from bar chart — title says 1-120
    const tramosSin121=tramos.filter(t=>t.k!=='t121');
    const lbls=tramosSin121.map(t=>t.l);
    const ds=hasPre
      ?[{label:'Pre-gestión',data:tramosSin121.map(t=>{const r=src[t.k];return r&&!isZ(r.cd)?r.cd:null;}),backgroundColor:'#7c3aed',borderRadius:4,borderSkipped:false},
        {label:'Digital',    data:tramosSin121.map(t=>{const r=src[t.k];return r&&!isZ(r.cd)?r.cd:null;}),backgroundColor:col,borderRadius:4,borderSkipped:false},
        {label:'Tradicional',data:tramosSin121.map(t=>{const r=src[t.k];return r&&!isZ(r.ct)?r.ct:null;}),backgroundColor:CTRAD,borderRadius:4,borderSkipped:false,borderColor:'#94a3b8',borderWidth:1.5}]
      :[{label:'Digital',data:tramosSin121.map(t=>{const r=src[t.k];return r?r.cd:null;}),backgroundColor:col,borderRadius:4,borderSkipped:false}];
    barCliChart('bTot',lbls,ds);
    lineEfChart('lTot');
  });
}

function renderTramoRes(p,key,title,hasPre){
  const isYape=entity==='yape';
  const src=isYape?YAPE:BCP;
  const d=src[key];
  if(!d){p.innerHTML=bcHtml(key+'-res')+'<div class="no-data"><span>🔍</span>Sin datos</div>';return;}

  let subRows='',subDef=[];
  if(isYape&&d.sub){
    subRows=d.sub.map(s=>`<tr><td style="padding-left:24px;font-family:var(--mono);font-size:12px;">${s.l}</td><td class="na-c">—</td><td class="na-c">—</td><td>${fmt.num(s.cd)}</td><td><span class="pill yape">${fmt.pct(s.ed)}</span></td><td>${fmt.mm(s.dvd)}</td><td>${fmt.mm(s.rd)}</td></tr>`).join('');
    subDef=d.sub;
  } else if(!isYape&&key==='t130'){
    subDef=[{l:'Personas',k:'p130',n:'p130-res'},{l:'Pyme',k:'py130',n:'py130-res'}];
    subRows=subDef.map(s=>tRow(s.l,BCP[s.k],hasPre,false,s.n,'rs')).join('');
  } else if(!isYape&&key==='t3160'){
    subDef=[{l:'Personas',k:'p3160',n:'p3160-res'},{l:'Pyme (solo Trad.)',k:'py3160',n:'py3160-res',nd:true}];
    subRows=subDef.map(s=>tRow(s.l,BCP[s.k],false,false,s.n,'rs',s.nd)).join('');
  }

  p.innerHTML=`${bcHtml(key+'-res')}
    <div class="sec-hdr an"><div class="sec-title ${entity}">${title}</div><div class="sec-sub">${entity.toUpperCase()} · ${hasPre?'Pre · Dig · Trad':'Dig vs Trad'}</div></div>
    ${hasPre?'':noPre()}
    ${wlBanner(d.ed,d.et,title)}
    ${kpiSection(d,hasPre,isYape)}
    ${chartsBlock('bTrm','Clientes por Sub-segmento',title,'lTrm')}
    <div class="tbl-section an an4"><div class="tbl-hdr"><div class="tbl-title">Desglose del Tramo</div><div class="tbl-badge">Toca → detalle</div></div>
    <div class="tbl-scroll"><table>${tHead(hasPre,isYape)}<tbody>${subRows}</tbody></table></div></div>`;

  requestAnimationFrame(()=>{
    renderDonuts(d,hasPre,isYape);
    const col=entColor();
    if(isYape&&subDef.length){
      barCliChart('bTrm',subDef.map(s=>s.l),[{label:'Digital',data:subDef.map(s=>s.cd),backgroundColor:col,borderRadius:4,borderSkipped:false}]);
    } else if(!isYape&&subDef.length){
      const lbls=subDef.map(s=>s.l);
      const ds=hasPre
        ?[{label:'Pre',data:subDef.map(s=>{const r=BCP[s.k];return r?r.cd:null;}),backgroundColor:'#7c3aed',borderRadius:4,borderSkipped:false},
          {label:'Digital',data:subDef.map(s=>{const r=BCP[s.k];return r&&!isZ(r.cd)?r.cd:null;}),backgroundColor:col,borderRadius:4,borderSkipped:false},
          {label:'Tradicional',data:subDef.map(s=>{const r=BCP[s.k];return r&&!isZ(r.ct)?r.ct:null;}),backgroundColor:CTRAD,borderRadius:4,borderSkipped:false,borderColor:'#94a3b8',borderWidth:1.5}]
        :[{label:'Digital',data:subDef.map(s=>{const r=BCP[s.k];return r&&!isZ(r.cd)?r.cd:null;}),backgroundColor:col,borderRadius:4,borderSkipped:false},
          {label:'Tradicional',data:subDef.map(s=>{const r=BCP[s.k];return r&&!isZ(r.ct)?r.ct:null;}),backgroundColor:CTRAD,borderRadius:4,borderSkipped:false,borderColor:'#94a3b8',borderWidth:1.5}];
      barCliChart('bTrm',lbls,ds);
    }
    lineEfChart('lTrm');
  });
}

// ─────────────────────────────────────────
//  PORTAFOLIO RESUMEN (Personas / Pyme)
// ─────────────────────────────────────────
function renderPortRes(p,key,portLabel,tramoLabel,hasPre,isPyme){
  const isYape=entity==='yape';
  const d=BCP[key];
  if(!d){p.innerHTML=bcHtml(key+'-res')+'<div class="no-data"><span>🔍</span>Sin datos</div>';return;}

  // Build segment sub-rows
  let segsKeys=[];
  if(key==='p130')segsKeys=[{l:'Seg A',k:'segA130',n:'segA130-res'},{l:'Seg B',k:'segB130',n:'segB130-res'},{l:'Seg C',k:'segC130',n:'segC130-res'},{l:'Seg D',k:'segD130',n:'segD130-res'}];
  if(key==='py130')segsKeys=[{l:'Seg A',k:'pyA130',n:'pyA130-res'},{l:'Seg B',k:'pyB130',n:'pyB130-res'},{l:'Seg C',k:'pyC130',n:'pyC130-res'},{l:'Seg D',k:'pyD130',n:'pyD130-res'}];
  if(key==='p3160')segsKeys=[{l:'0–1K',k:'p3160-0-1k',n:'p3160-0-1k'},{l:'1K–5K',k:'p3160-1k-5k',n:'p3160-1k-5k'},{l:'5K–20K',k:'p3160-5k-20k',n:'p3160-5k-20k'},{l:'20K–300K',k:'p3160-20k-300k',n:'p3160-20k-300k'},{l:'300K+',k:'p3160-300k',n:'p3160-300k'}];
  const rows=segsKeys.map(s=>tRow(s.l,BCP[s.k]||{},hasPre,false,s.n,'rs')).join('');

  p.innerHTML=`${bcHtml(key+'-res')}
    <div class="sec-hdr an"><div class="sec-title bcp">${portLabel}</div><div class="sec-sub">BCP · ${tramoLabel} · ${hasPre?'Pre · Dig · Trad':'Dig vs Trad'}</div></div>
    ${hasPre?'':noPre()}
    ${wlBanner(d.ed,d.et,portLabel)}
    ${kpiSection(d,hasPre,false)}
    ${chartsBlock('bPort',key==='p3160'?'Clientes por Ticket':'Clientes por Segmento',`${portLabel} · ${tramoLabel}`,'lPort')}
    <div class="tbl-section an an4"><div class="tbl-hdr"><div class="tbl-title">${key==='p3160'?'Tickets de Deuda':'Segmentos'}</div><div class="tbl-badge">Toca → detalle</div></div>
    <div class="tbl-scroll"><table>${tHead(hasPre,false)}<tbody>${rows}</tbody></table></div></div>`;

  requestAnimationFrame(()=>{
    renderDonuts(d,hasPre,false);
    const col=entColor();
    const lbls=segsKeys.map(s=>s.l);
    const ds=hasPre
      ?[{label:'Pre',data:segsKeys.map(s=>{const r=BCP[s.k];return r&&!isZ(r.cd)?r.cd:null;}),backgroundColor:'#7c3aed',borderRadius:4,borderSkipped:false},
        {label:'Digital',data:segsKeys.map(s=>{const r=BCP[s.k];return r&&!isZ(r.cd)?r.cd:null;}),backgroundColor:col,borderRadius:4,borderSkipped:false},
        {label:'Tradicional',data:segsKeys.map(s=>{const r=BCP[s.k];return r&&!isZ(r.ct)?r.ct:null;}),backgroundColor:CTRAD,borderRadius:4,borderSkipped:false,borderColor:'#94a3b8',borderWidth:1.5}]
      :[{label:'Digital',data:segsKeys.map(s=>{const r=BCP[s.k];return r&&!isZ(r.cd)?r.cd:null;}),backgroundColor:col,borderRadius:4,borderSkipped:false},
        {label:'Tradicional',data:segsKeys.map(s=>{const r=BCP[s.k];return r&&!isZ(r.ct)?r.ct:null;}),backgroundColor:CTRAD,borderRadius:4,borderSkipped:false,borderColor:'#94a3b8',borderWidth:1.5}];
    barCliChart('bPort',lbls,ds);
    lineEfChart('lPort');
  });
}

// ─────────────────────────────────────────
//  SEGMENT RESUMEN (con tickets)
// ─────────────────────────────────────────
function renderSegRes(p,key,segLabel,ctxLabel,hasPre,isPyme){
  const d=BCP[key];
  if(!d){p.innerHTML=bcHtml(key+'-res')+'<div class="no-data"><span>🔍</span>Sin datos</div>';return;}

  // Find tickets for this segment
  const prefix=key;
  const allTks=['0-1k','1k-5k','5k-20k','20k-300k','300k'];
  const availTks=allTks.filter(tk=>BCP[prefix+'-'+tk]!=null);

  const rows=availTks.map(tk=>{
    const td=BCP[prefix+'-'+tk];
    const nd=isZ(td.cd)&&!isZ(td.ct);
    return tRow(TK[tk],td,hasPre,false,prefix+'-'+tk,'rs',nd);
  }).join('');

  p.innerHTML=`${bcHtml(key+'-res')}
    <div class="sec-hdr an"><div class="sec-title bcp">${segLabel}</div><div class="sec-sub">BCP · ${ctxLabel}</div></div>
    ${hasPre?'':noPre()}
    ${wlBanner(d.ed,d.et,segLabel)}
    ${kpiSection(d,hasPre,false)}
    ${chartsBlock('bSeg','Clientes por Ticket de Deuda',`${segLabel} · ${ctxLabel}`,'lSeg')}
    <div class="tbl-section an an4"><div class="tbl-hdr"><div class="tbl-title">Tickets de Deuda</div><div class="tbl-badge">Toca → detalle</div></div>
    <div class="tbl-scroll"><table>${tHead(hasPre,false)}<tbody>${rows}</tbody></table></div></div>`;

  requestAnimationFrame(()=>{
    renderDonuts(d,hasPre,false);
    const col=entColor();
    const lbls=availTks.map(tk=>TK[tk]);
    const ds=hasPre
      ?[{label:'Pre',data:availTks.map(tk=>{const r=BCP[prefix+'-'+tk];return r&&!isZ(r.cd)?r.cd:null;}),backgroundColor:'#7c3aed',borderRadius:4,borderSkipped:false},
        {label:'Digital',data:availTks.map(tk=>{const r=BCP[prefix+'-'+tk];return r&&!isZ(r.cd)?r.cd:null;}),backgroundColor:col,borderRadius:4,borderSkipped:false},
        {label:'Tradicional',data:availTks.map(tk=>{const r=BCP[prefix+'-'+tk];return r&&!isZ(r.ct)?r.ct:null;}),backgroundColor:CTRAD,borderRadius:4,borderSkipped:false,borderColor:'#94a3b8',borderWidth:1.5}]
      :[{label:'Digital',data:availTks.map(tk=>{const r=BCP[prefix+'-'+tk];return r&&!isZ(r.cd)?r.cd:null;}),backgroundColor:col,borderRadius:4,borderSkipped:false},
        {label:'Tradicional',data:availTks.map(tk=>{const r=BCP[prefix+'-'+tk];return r&&!isZ(r.ct)?r.ct:null;}),backgroundColor:CTRAD,borderRadius:4,borderSkipped:false,borderColor:'#94a3b8',borderWidth:1.5}];
    barCliChart('bSeg',lbls,ds);
    lineEfChart('lSeg');
  });
}

// ─────────────────────────────────────────
//  TICKET DETAIL (BCP)
// ─────────────────────────────────────────
function renderTicketBCP(p,prefix,tk,segLabel,ctxLabel,hasPre){
  if(hasPre===undefined)hasPre=true;
  const key=prefix+'-'+tk;
  const d=BCP[key];
  if(!d){p.innerHTML=bcHtml(key)+'<div class="no-data"><span>🔍</span>Sin datos para este ticket</div>';return;}
  const nd=isZ(d.cd)&&!isZ(d.ct);

  p.innerHTML=`${bcHtml(key)}
    <div class="sec-hdr an"><div class="sec-title bcp">${TK[tk]||tk}</div><div class="sec-sub">BCP · ${segLabel} · ${ctxLabel}</div></div>
    ${hasPre?'':noPre()}
    ${wlBanner(nd?null:d.ed,d.et,TK[tk]||tk,nd)}
    ${kpiSection(d,hasPre,false)}
    <div class="tbl-section an an3"><div class="tbl-hdr"><div class="tbl-title">Comparativo de Canales</div></div>
    <div class="tbl-scroll"><table>${tHead(hasPre,false)}<tbody>${tRow(TK[tk]||tk,d,hasPre,false,null,'',nd)}</tbody></table></div></div>`;

  requestAnimationFrame(()=>renderDonuts(d,hasPre,false));
}

// ─────────────────────────────────────────
//  SIMPLE (sin zoom: 61-90, 91-120, +120)
// ─────────────────────────────────────────
function renderSimple(p,key,title,sub,hasPre,hasTickets,noDig){
  const isYape=entity==='yape';
  const src=isYape?YAPE:BCP;
  const d=src[key];
  if(!d){p.innerHTML=bcHtml(currentView)+'<div class="no-data"><span>🔍</span>Sin datos</div>';return;}
  const nd=noDig||false;

  let tickRows='';
  if(hasTickets&&!isYape){
    const tks=['t121-0-1k','t121-1k'];
    tickRows=tks.map(tk=>tRow(TK[tk.replace('t121-','')]||tk,BCP[tk],hasPre,false,tk,'rs')).join('');
  }

  const yapeSubRows=isYape&&d.sub?d.sub.map(s=>`<tr><td style="padding-left:24px;font-family:var(--mono);font-size:12px;">${s.l}</td><td class="na-c">—</td><td class="na-c">—</td><td>${fmt.num(s.cd)}</td><td><span class="pill yape">${fmt.pct(s.ed)}</span></td><td>${fmt.mm(s.dvd)}</td><td>${fmt.mm(s.rd)}</td></tr>`).join(''):tickRows;

  p.innerHTML=`${bcHtml(currentView)}
    <div class="sec-hdr an"><div class="sec-title ${entity}">${title}</div><div class="sec-sub">${entity.toUpperCase()} · ${sub}</div></div>
    ${hasPre?'':noPre()}
    ${wlBanner(nd?null:d.ed,d.et,title,nd)}
    ${kpiSection(d,hasPre,isYape)}
    <div class="tbl-section an an3"><div class="tbl-hdr"><div class="tbl-title">Indicadores</div><div class="tbl-badge">${hasTickets||isYape&&d.sub?'Desglose disponible':'Sin zoom disponible'}</div></div>
    <div class="tbl-scroll"><table>${tHead(hasPre,isYape)}<tbody>${tRow(title,d,hasPre,isYape,null,'',nd)}${yapeSubRows}</tbody></table></div></div>`;

  requestAnimationFrame(()=>renderDonuts(d,hasPre,isYape));
}

// ─────────────────────────────────────────
//  TICKET SIMPLE (+120 tickets)
// ─────────────────────────────────────────
function renderTicketSimple(p,key,label,tramoLabel){
  const d=BCP[key];
  if(!d){p.innerHTML=bcHtml(key)+'<div class="no-data"><span>🔍</span>Sin datos</div>';return;}
  const nd=isZ(d.cd)&&!isZ(d.ct);

  p.innerHTML=`${bcHtml(key)}
    <div class="sec-hdr an"><div class="sec-title bcp">${label}</div><div class="sec-sub">BCP · ${tramoLabel}</div></div>
    ${noPre()}
    ${wlBanner(nd?null:d.ed,d.et,label,nd)}
    ${kpiSection(d,false,false)}
    <div class="tbl-section an an3"><div class="tbl-hdr"><div class="tbl-title">Comparativo de Canales</div></div>
    <div class="tbl-scroll"><table>${tHead(false,false)}<tbody>${tRow(label,d,false,false,null,'',nd)}</tbody></table></div></div>`;

  requestAnimationFrame(()=>renderDonuts(d,false,false));
}
